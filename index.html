    <script>
      // Reload once after the PWA service worker takes control so it can inject
      // Cross-Origin Isolation headers (COEP:credentialless + COOP:same-origin),
      // enabling SharedArrayBuffer for WASM threading on GitHub Pages.
      if (window.crossOriginIsolated === false && !sessionStorage.getItem('coi-reload')) {
        sessionStorage.setItem('coi-reload', '1')
        if (navigator.serviceWorker && navigator.serviceWorker.controller) {
          location.reload()
        } else if (navigator.serviceWorker) {
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            location.reload()
          })
        }
      }
    </script>
