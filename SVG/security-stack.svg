<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="1200" height="120">
        <defs>
            <style>
                .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #1F2937; }
                .components { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 13px; fill: #6B7280; }
                .stats { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 12px; fill: #6B7280; }
                .progress-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 10px; fill: #9CA3AF; }
                .filter-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 500; fill: #4B5563; }
            </style>
        </defs>

        <!-- Card Background -->
        <rect x="10" y="10" width="1180" height="100" rx="12" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>

        <!-- Icon Box -->
        <rect x="30" y="30" width="60" height="60" rx="12" fill="#FFFFFF"/>
        <g transform="translate(48, 48)" color="#EF4444">
            <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2.89 0 5.13.89 6.87 1.74a1 1 0 0 1 .53.84V13z" stroke="currentColor" stroke-width="2" fill="none"/><path d="m9 12 2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </g>

        <!-- Texts -->
        <text x="110" y="45" class="title">Security Stack</text>
        <text x="110" y="65" class="components">KMS, PKI, Crypto & PQC Libraries, CLM, Secrets, IAM, CIAM, Data Protection, Crypto Discovery, TLS/SSL, Digital Identity</text>

        <!-- Progress Bars -->
        <g transform="translate(110, 85)">
            <rect x="0" y="0" width="66" height="4" rx="2" fill="#22C55E"/>
            <rect x="66" y="0" width="60" height="4" rx="2" fill="#F59E0B"/>
            <rect x="126" y="0" width="24" height="4" rx="2" fill="#E5E7EB"/>
            
            <text x="0" y="18" class="progress-text">44%</text>
            <text x="150" y="18" class="progress-text" text-anchor="end">40%</text>
        </g>

        <!-- Stats -->
        <text x="920" y="65" class="stats" text-anchor="end">103 of 111 products</text>

        <!-- Dynamic Button if present -->
        

        <!-- Filter Button -->
        <rect x="1060" y="40" width="100" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.5"/>
        <text x="1110" y="65" class="filter-text" text-anchor="middle">Click to filter</text>
    </svg>