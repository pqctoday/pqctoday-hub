<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="1200" height="120">
        <defs>
            <style>
                .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #1F2937; }
                .components { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 13px; fill: #6B7280; }
                .stats { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 12px; fill: #6B7280; }
                .progress-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 10px; fill: #9CA3AF; }
                .filter-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 500; fill: #4B5563; }
            </style>
        </defs>

        <!-- Card Background -->
        <rect x="10" y="10" width="1180" height="100" rx="12" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>

        <!-- Icon Box -->
        <rect x="30" y="30" width="60" height="60" rx="12" fill="#FFFFFF"/>
        <g transform="translate(48, 48)" color="#10B981">
            <polyline points="16 18 22 12 16 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/><polyline points="8 6 2 12 8 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </g>

        <!-- Texts -->
        <text x="110" y="45" class="title">Libraries & SDKs</text>
        <text x="110" y="65" class="components">Cryptographic Libraries, PQC Libraries, API Security, Code Signing, Digital Signatures, Disk Encryption, SDKs</text>

        <!-- Progress Bars -->
        <g transform="translate(110, 85)">
            <rect x="0" y="0" width="106.5" height="4" rx="2" fill="#22C55E"/>
            <rect x="106.5" y="0" width="31.5" height="4" rx="2" fill="#F59E0B"/>
            <rect x="138" y="0" width="12" height="4" rx="2" fill="#E5E7EB"/>
            
            <text x="0" y="18" class="progress-text">71%</text>
            <text x="150" y="18" class="progress-text" text-anchor="end">21%</text>
        </g>

        <!-- Stats -->
        <text x="920" y="65" class="stats" text-anchor="end">75 of 102 products</text>

        <!-- Dynamic Button if present -->
        
            <rect x="950" y="45" width="90" height="30" rx="15" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
            <text x="995" y="65" font-family="Arial, sans-serif" font-size="12" fill="#10B981" text-anchor="middle" font-weight="bold">1 selected</text>
        

        <!-- Filter Button -->
        <rect x="1060" y="40" width="100" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.5"/>
        <text x="1110" y="65" class="filter-text" text-anchor="middle">Click to filter</text>
    </svg>