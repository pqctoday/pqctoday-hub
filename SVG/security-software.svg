<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="1200" height="120">
        <defs>
            <style>
                .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #1F2937; }
                .components { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 13px; fill: #6B7280; }
                .stats { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 12px; fill: #6B7280; }
                .progress-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 10px; fill: #9CA3AF; }
                .filter-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 500; fill: #4B5563; }
            </style>
        </defs>

        <!-- Card Background -->
        <rect x="10" y="10" width="1180" height="100" rx="12" fill="#FDF4FF" stroke="#F0ABFC" stroke-width="1"/>

        <!-- Icon Box -->
        <rect x="30" y="30" width="60" height="60" rx="12" fill="#FFFFFF"/>
        <g transform="translate(48, 48)" color="#D946EF">
            <rect width="20" height="8" x="2" y="2" rx="2" ry="2" stroke="currentColor" stroke-width="2" fill="none"/><rect width="20" height="8" x="2" y="14" rx="2" ry="2" stroke="currentColor" stroke-width="2" fill="none"/><line x1="6" x2="6.01" y1="6" y2="6" stroke="currentColor" stroke-width="2"/><line x1="6" x2="6.01" y1="18" y2="18" stroke="currentColor" stroke-width="2"/>
        </g>

        <!-- Texts -->
        <text x="110" y="45" class="title">Security Software</text>
        <text x="110" y="65" class="components">Data Protection, Digital Identity, Secrets Management, Security Discovery, IoT/OT, AI/ML Security, Supply Chain</text>

        <!-- Progress Bars -->
        <g transform="translate(110, 85)">
            <rect x="0" y="0" width="31.5" height="4" rx="2" fill="#22C55E"/>
            <rect x="31.5" y="0" width="115.5" height="4" rx="2" fill="#F59E0B"/>
            <rect x="147" y="0" width="3" height="4" rx="2" fill="#E5E7EB"/>
            
            <text x="0" y="18" class="progress-text">21%</text>
            <text x="150" y="18" class="progress-text" text-anchor="end">77%</text>
        </g>

        <!-- Stats -->
        <text x="920" y="65" class="stats" text-anchor="end">56 of 57 products</text>

        <!-- Dynamic Button if present -->
        

        <!-- Filter Button -->
        <rect x="1060" y="40" width="100" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.5"/>
        <text x="1110" y="65" class="filter-text" text-anchor="middle">Click to filter</text>
    </svg>