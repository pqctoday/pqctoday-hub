<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PQC Infrastructure - AI Zoom Map</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap');

      :root {
        --bg-color: #f4efdf;
        --line-color: #4a4036;
        --text-main: #3d352b;
        --text-muted: #6b6255;
        --accent-green: #d1dbcd;
        --accent-blue: #d4dfec;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-color);
        background-image: radial-gradient(#d6cebd 1px, transparent 1px);
        background-size: 30px 30px;
        font-family: 'Inter', sans-serif;
        color: var(--text-main);
        overflow: hidden;
        user-select: none;
      }

      /* Viewport Engine */
      #viewport {
        width: 100vw;
        height: 100vh;
        cursor: grab;
        position: relative;
        overflow: hidden;
      }
      #viewport.zoomed {
        cursor: default;
      }

      #map {
        position: absolute;
        transform-origin: 0 0;
        width: 10000px;
        height: 10000px;
        transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
      }

      /* Layer Districts */
      .district {
        position: absolute;
        z-index: 10;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        transition: filter 0.3s;
      }
      .district:hover {
        filter: brightness(1.05);
      }

      .district img {
        width: 1500px;
        height: auto;
        filter: drop-shadow(0 40px 40px rgba(0, 0, 0, 0.1));
      }

      .district-title {
        position: absolute;
        top: -100px;
        font-family: 'Playfair Display', serif;
        font-size: 100px;
        font-weight: 600;
        color: var(--text-main);
        background: rgba(244, 239, 223, 0.8);
        padding: 20px 50px;
        border-radius: 50px;
        border: 4px solid var(--line-color);
        pointer-events: none;
        opacity: 1;
        transition: opacity 0.5s;
      }

      /* Sub-components (POIs) */
      .poi-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.5s;
      }

      .poi {
        position: absolute;
        background: rgba(255, 255, 255, 0.95);
        border: 3px solid var(--line-color);
        border-radius: 12px;
        padding: 15px 30px;
        font-size: 32px;
        font-weight: 600;
        color: var(--text-main);
        box-shadow: 4px 8px 0 rgba(74, 64, 54, 0.15);
        cursor: pointer;
        z-index: 20;
        pointer-events: auto;
        transition:
          transform 0.2s,
          background 0.2s;
        white-space: nowrap;
      }
      .poi::after {
        content: '';
        position: absolute;
        bottom: -24px;
        left: 50%;
        width: 3px;
        height: 24px;
        background: var(--line-color);
      }

      .poi:hover {
        transform: translateY(-5px);
        background: #fff;
        color: #b94a3e;
      }

      /* Navigation HUD */
      #nav-hud {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: #fffdf9;
        border: 1.5px solid var(--line-color);
        border-radius: 50px;
        padding: 10px 20px;
        display: flex;
        gap: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        z-index: 1000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s;
        align-items: center;
      }

      #nav-hud.visible {
        opacity: 1;
        pointer-events: auto;
      }

      .nav-btn {
        background: none;
        border: 1px solid var(--line-color);
        padding: 10px 20px;
        border-radius: 30px;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-main);
        cursor: pointer;
        transition: all 0.2s;
      }
      .nav-btn:hover {
        background: var(--line-color);
        color: white;
      }

      #current-layer-name {
        font-family: 'Playfair Display', serif;
        font-size: 18px;
        font-weight: 600;
        padding: 0 15px;
        min-width: 200px;
        text-align: center;
      }

      /* Detail Panel Overlay (for POIs) */
      #detail-overlay {
        position: fixed;
        top: 50%;
        left: 50px;
        transform: translateY(-50%);
        background: #fffdf9;
        border: 1.5px solid var(--line-color);
        border-radius: 12px;
        width: 400px;
        padding: 30px;
        box-shadow: 4px 8px 0 rgba(74, 64, 54, 0.1);
        z-index: 2000;
        display: none;
        flex-direction: column;
        gap: 15px;
      }
      #detail-overlay h2 {
        font-family: 'Playfair Display', serif;
        font-size: 28px;
        margin: 0;
        color: var(--text-main);
      }
      .info-box {
        background: var(--bg-color);
        border: 1px solid var(--line-color);
        border-radius: 8px;
        padding: 15px;
        font-size: 14px;
        line-height: 1.5;
      }
      .close-btn {
        position: absolute;
        top: 15px;
        right: 15px;
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: var(--line-color);
      }

      /* Top Title */
      .main-title {
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Playfair Display', serif;
        font-size: 24px;
        font-weight: 600;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid var(--line-color);
        padding: 10px 30px;
        border-radius: 30px;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div class="main-title" id="main-title">Infrastructure Overview map</div>

    <div id="nav-hud">
      <button class="nav-btn" onclick="prevLayer()">← Previous</button>
      <div id="current-layer-name">Layer Name</div>
      <button class="nav-btn" onclick="nextLayer()">Next →</button>
      <div style="width: 1px; height: 20px; background: var(--line-color); margin: 0 10px"></div>
      <button
        class="nav-btn"
        onclick="zoomOutToMap()"
        style="background: var(--line-color); color: white"
      >
        Back to Map
      </button>
    </div>

    <div id="detail-overlay">
      <button class="close-btn" onclick="closeOverlay()">✕</button>
      <h2 id="detail-title">Component Name</h2>
      <div class="info-box">
        <p><strong>Status:</strong> <span style="color: #4a7c59">Operational</span></p>
        <p>This sub-component is functioning correctly within its layer.</p>
      </div>
    </div>

    <div id="viewport">
      <div id="map">
        <!-- Layers injected by JS -->
      </div>
    </div>

    <script>
      // The 9 Layers exact scope from the user's screenshot
      const layersData = [
        {
          id: 'cloud',
          title: 'Cloud',
          img: 'maps/illustrated_cloud_rack.png',
          x: 2000,
          y: 2000,
          components: [
            'Cloud KMS',
            'Cloud HSM',
            'Encryption Gateways',
            'Crypto Agility',
            'KMS',
            'IAM',
            'Crypto Discovery',
            'Digital Identity',
          ],
        },
        {
          id: 'network',
          title: 'Network',
          img: 'maps/illustrated_network_router.png',
          x: 5000,
          y: 2000,
          components: [
            'VPN',
            'IPsec',
            'Network Security',
            'Network Encryptors',
            'Protocol Analyzers',
            '5G & Telecom',
            'Testing & Validation',
          ],
        },
        {
          id: 'app_servers',
          title: 'Application Servers',
          img: 'maps/illustrated_server.png',
          x: 8000,
          y: 2000,
          components: [
            'TLS/SSL',
            'SSH',
            'Web Browsers',
            'App Servers',
            'Email',
            'Messaging',
            'Blockchain',
            'Payment',
            'VPN',
            'Remote Access',
            'CI/CD',
          ],
        },
        {
          id: 'libraries',
          title: 'Libraries & SDKs',
          img: 'maps/illustrated_library.png',
          x: 2000,
          y: 5000,
          components: [
            'Cryptographic Libraries',
            'PQC Libraries',
            'API Security',
            'Code Signing',
            'Digital Signatures',
            'Disk Encryption',
            'SDKs',
          ],
        },
        {
          id: 'sec_software',
          title: 'Security Software',
          img: 'maps/illustrated_security_software.png',
          x: 5000,
          y: 5000,
          components: [
            'Data Protection',
            'Digital Identity',
            'Secrets Management',
            'Security Discovery',
            'IoT/OT',
            'AI/ML Security',
            'Supply Chain',
          ],
        },
        {
          id: 'database',
          title: 'Database',
          img: 'maps/illustrated_database_array.png',
          x: 8000,
          y: 5000,
          components: ['Database Encryption Software'],
        },
        {
          id: 'sec_stack',
          title: 'Security Stack',
          img: 'maps/illustrated_hsm_appliance.png',
          x: 2000,
          y: 8000,
          components: [
            'KMS',
            'PKI',
            'Crypto & PQC Libraries',
            'CLM',
            'Secrets',
            'IAM',
            'CIAM',
            'Data Protection',
            'Crypto Discovery',
            'TLS/SSL',
            'Digital Identity',
          ],
        },
        {
          id: 'os',
          title: 'Operating System',
          img: 'maps/illustrated_os.png',
          x: 5000,
          y: 8000,
          components: ['Operating Systems', 'Network OS', 'Disk & File Encryption'],
        },
        {
          id: 'hardware',
          title: 'Hardware & Secure Elements',
          img: 'maps/illustrated_microchip.png',
          x: 8000,
          y: 8000,
          components: [
            'HSMs',
            'Smart Cards',
            'Secure Boot',
            'Semiconductors',
            'QRNG',
            'QKD',
            'Confidential Computing',
            '5G & Telecom',
          ],
        },
      ]

      const mapEl = document.getElementById('map')
      const viewport = document.getElementById('viewport')
      const navHud = document.getElementById('nav-hud')
      const currentLayerName = document.getElementById('current-layer-name')

      let currentLayerIndex = -1

      // Build the Map
      layersData.forEach((layer, index) => {
        const distEl = document.createElement('div')
        distEl.className = 'district'
        distEl.id = `district-${index}`
        distEl.style.left = `${layer.x}px`
        distEl.style.top = `${layer.y}px`

        distEl.innerHTML = `
                <div class="district-title">${layer.title}</div>
                <img src="${layer.img}" alt="${layer.title}">
            `

        // Click to zoom in
        distEl.onclick = () => zoomToLayer(index)

        // Container for POIs (Sub-components)
        const poiContainer = document.createElement('div')
        poiContainer.className = 'poi-container'
        poiContainer.id = `poi-${index}`

        // Arrange sub-components in a circle around the building
        const radius = 1000
        layer.components.forEach((comp, i) => {
          const angle = (i / layer.components.length) * Math.PI * 2
          const poiX = Math.cos(angle) * radius
          const poiY = Math.sin(angle) * (radius * 0.6) // isometric squash

          const poiEl = document.createElement('div')
          poiEl.className = 'poi'
          // Center the POI relative to the district center
          poiEl.style.left = `calc(50% + ${poiX}px)`
          poiEl.style.top = `calc(50% + ${poiY}px)`
          poiEl.innerText = comp

          poiEl.onclick = (e) => {
            e.stopPropagation() // prevent zooming out
            openOverlay(comp)
          }

          poiContainer.appendChild(poiEl)
        })

        distEl.appendChild(poiContainer)
        mapEl.appendChild(distEl)
      })

      // Zoom Engine
      let isMapMode = true
      let mapScale = 0.15
      let mapPanX = window.innerWidth / 2 - 5000 * mapScale
      let mapPanY = window.innerHeight / 2 - 5000 * mapScale

      function applyTransform(x, y, scale) {
        mapEl.style.transform = `translate(${x}px, ${y}px) scale(${scale})`
      }

      function zoomOutToMap() {
        isMapMode = true
        currentLayerIndex = -1
        applyTransform(mapPanX, mapPanY, mapScale)
        navHud.classList.remove('visible')
        viewport.classList.remove('zoomed')
        document.getElementById('main-title').style.display = 'block'
        closeOverlay()

        // Hide all POIs and show titles, disable POI clicks
        layersData.forEach((_, i) => {
          const poiContainer = document.getElementById(`poi-${i}`)
          poiContainer.style.opacity = '0'
          // Disable pointer events on all children by adding a class or setting style
          Array.from(poiContainer.children).forEach((poi) => (poi.style.pointerEvents = 'none'))
          document.getElementById(`district-${i}`).querySelector('.district-title').style.opacity =
            '1'
        })
      }

      function zoomToLayer(index) {
        isMapMode = false
        currentLayerIndex = index
        const layer = layersData[index]

        // Calculate transform to center the layer at scale 1.0
        const scale = 0.6 // zoomed in scale
        const x = window.innerWidth / 2 - layer.x * scale
        // Shift up slightly to leave room for the HUD
        const y = window.innerHeight / 2 - layer.y * scale - 100

        applyTransform(x, y, scale)

        navHud.classList.add('visible')
        viewport.classList.add('zoomed')
        document.getElementById('main-title').style.display = 'none'
        currentLayerName.innerText = layer.title

        // Hide all titles and show ONLY the POIs for this layer, enabling clicks
        layersData.forEach((_, i) => {
          const poiContainer = document.getElementById(`poi-${i}`)
          poiContainer.style.opacity = i === index ? '1' : '0'
          Array.from(poiContainer.children).forEach(
            (poi) => (poi.style.pointerEvents = i === index ? 'auto' : 'none')
          )
          document.getElementById(`district-${i}`).querySelector('.district-title').style.opacity =
            i === index ? '0' : '1'
        })
      }

      function nextLayer() {
        if (currentLayerIndex < layersData.length - 1) {
          zoomToLayer(currentLayerIndex + 1)
        } else {
          zoomToLayer(0) // wrap around
        }
      }

      function prevLayer() {
        if (currentLayerIndex > 0) {
          zoomToLayer(currentLayerIndex - 1)
        } else {
          zoomToLayer(layersData.length - 1) // wrap around
        }
      }

      // Panning in Map Mode
      let isDragging = false
      let startX, startY

      viewport.addEventListener('mousedown', (e) => {
        if (
          !isMapMode ||
          e.target.closest('.nav-btn') ||
          e.target.closest('.poi') ||
          e.target.closest('#detail-overlay')
        )
          return
        isDragging = true
        startX = e.clientX - mapPanX
        startY = e.clientY - mapPanY
      })

      window.addEventListener('mouseup', () => (isDragging = false))

      window.addEventListener('mousemove', (e) => {
        if (!isDragging || !isMapMode) return
        mapPanX = e.clientX - startX
        mapPanY = e.clientY - startY
        applyTransform(mapPanX, mapPanY, mapScale)
      })

      // Detail Overlay
      const overlay = document.getElementById('detail-overlay')
      const overlayTitle = document.getElementById('detail-title')

      function openOverlay(name) {
        overlayTitle.innerText = name
        overlay.style.display = 'flex'
      }

      function closeOverlay() {
        overlay.style.display = 'none'
      }

      // Initial state
      zoomOutToMap()
    </script>
  </body>
</html>
