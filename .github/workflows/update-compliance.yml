name: Update Compliance Data

on:
  schedule:
    - cron: '0 8 * * *' # Run daily at 8:00 AM UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Scraper Dependencies
        run: npm install -D tsx jsdom @types/jsdom papaparse @types/papaparse

      - name: Run Scraper
        run: npm run scrape

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore(data): update compliance-data.json [skip ci]'
          file_pattern: 'public/data/compliance-data.json'
