name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=high --omit=dev

      - name: Check Formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Lint Changelog Personas
        run: npm run lint:changelog

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  content-integrity:
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && needs.checks.result == 'success'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run data integrity validator
        run: |
          mkdir -p reports
          npx tsx scripts/validate-data-integrity.ts --json --report-only > reports/integrity.json 2>/dev/null

      - name: Check for content accuracy errors
        run: |
          ERRORS=$(jq '[.checkResults[] | select(.status == "FAIL") | select(.severity == "ERROR") | select(.id | test("^(QA-F[136]|N23-[CD])$"))] | length' reports/integrity.json)
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Content accuracy check found $ERRORS factual error(s):"
            jq -r '.checkResults[] | select(.status == "FAIL") | select(.severity == "ERROR") | select(.id | test("^(QA-F[136]|N23-[CD])$")) | "  [\(.id)] \(.description) — \(.findings | length) finding(s)"' reports/integrity.json
            exit 1
          fi
          echo "Content accuracy checks passed (0 factual errors)."

      - name: Report check summary
        if: always()
        run: |
          echo "=== Data Integrity Summary ==="
          jq -r '"Total: \(.summary.totalChecks) | Passed: \(.summary.passed) | Errors: \(.summary.errors) | Warnings: \(.summary.warnings)"' reports/integrity.json

      - name: Upload integrity report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: integrity-report
          path: reports/integrity.json
          retention-days: 30
        continue-on-error: true
